<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>YouTube Playlist Creator</title>
  <script src="https://accounts.google.com/gsi/client" async defer onload="initGoogleAuth()"></script>
  <style>
    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue:        #60a5fa;
      --purple:      #a78bfa;
      --green:       #22c55e;
      --red:         #ef4444;
      --surface:     rgba(255, 255, 255, 0.05);
      --surface-md:  rgba(255, 255, 255, 0.08);
      --border:      rgba(255, 255, 255, 0.13);
      --text-base:   #f1f5f9;
      --text-muted:  #94a3b8;
      --text-soft:   #cbd5e1;
      --radius-sm:   0.75rem;
      --radius-md:   1rem;
      --radius-lg:   1.75rem;
      --radius-pill: 3rem;
      --shadow-card: 0 25px 60px -12px rgba(0, 0, 0, 0.55);
      --transition:  0.22s cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1a2540 50%, #1e293b 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 1.5rem);
      color: var(--text-base);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ============================================
       CARD
    ============================================ */
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: clamp(1.4rem, 5vw, 2.2rem);
      width: 100%;
      max-width: 660px;
      box-shadow: var(--shadow-card);
      animation: cardEntrance 0.65s cubic-bezier(0.16, 1, 0.3, 1) both;
      position: relative;
      overflow: hidden;
    }

    /* Subtle top-edge glow */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        160deg,
        rgba(96, 165, 250, 0.06) 0%,
        transparent 50%
      );
      pointer-events: none;
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ============================================
       TYPOGRAPHY
    ============================================ */
    h1 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      background: linear-gradient(100deg, var(--blue) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1.15;
      margin-bottom: 0.45rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .title-icon {
      /* SVG inherits gradient color via wrapper trick */
      flex-shrink: 0;
      width: clamp(22px, 4vw, 28px);
      height: clamp(22px, 4vw, 28px);
      stroke: var(--blue);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      /* pull out of gradient clip */
      -webkit-text-fill-color: initial;
      filter: drop-shadow(0 0 6px rgba(96,165,250,0.4));
    }

    .subtitle {
      color: var(--text-muted);
      font-size: clamp(0.85rem, 2.5vw, 0.98rem);
      line-height: 1.55;
      margin-bottom: clamp(1.4rem, 4vw, 2rem);
    }

    label {
      display: block;
      margin-bottom: 0.42rem;
      font-weight: 500;
      color: var(--text-soft);
      font-size: clamp(0.8rem, 2vw, 0.9rem);
      letter-spacing: 0.25px;
    }

    /* ============================================
       VISIBILITY HELPERS
    ============================================ */
    .hidden {
      display: none !important;
    }

    /* ============================================
       VIEW TRANSITIONS
    ============================================ */
    .view {
      animation: fadeSlideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================
       LOGIN SCREEN
    ============================================ */
    .login-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    .login-container h1 {
      justify-content: center;
    }

    .login-container .subtitle {
      max-width: 340px;
    }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      background: #ffffff;
      color: #1e293b;
      font-weight: 600;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      padding: 0.75rem 1.8rem;
      border: none;
      border-radius: var(--radius-pill);
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        background var(--transition);
      margin: 0 auto clamp(0.8rem, 3vw, 1.2rem);
      white-space: nowrap;
    }

    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.38);
      background: #f1f5f9;
    }

    .google-btn:active {
      transform: translateY(0px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    }

    .google-btn:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }

    .google-logo {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .login-hint {
      font-size: 0.78rem;
      color: #4a5568;
      color: #64748b;
      line-height: 1.5;
    }

    /* ============================================
       PROFILE AREA
    ============================================ */
    .profile-area {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      margin-bottom: clamp(1.2rem, 4vw, 1.8rem);
      background: var(--surface-md);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.65rem 1rem 0.65rem 0.65rem;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .user-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--blue);
      object-fit: cover;
      display: block;
    }

    .avatar-online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      background: var(--green);
      border-radius: 50%;
      border: 2px solid #1e293b;
    }

    .user-info {
      flex: 1;
      min-width: 0; /* allow truncation */
    }

    .user-name {
      font-weight: 600;
      font-size: clamp(0.9rem, 2.5vw, 1.05rem);
      color: #f8fafc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-email {
      font-size: clamp(0.72rem, 2vw, 0.8rem);
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-soft);
      padding: 0.42rem 0.9rem;
      border-radius: var(--radius-pill);
      font-size: clamp(0.72rem, 2vw, 0.8rem);
      font-weight: 500;
      cursor: pointer;
      transition:
        background var(--transition),
        border-color var(--transition),
        color var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
    }

    .logout-btn:hover {
      background: rgba(248, 113, 113, 0.1);
      border-color: #f87171;
      color: #fca5a5;
    }

    .logout-btn:focus-visible {
      outline: 2px solid var(--red);
      outline-offset: 2px;
    }

    .logout-icon {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ============================================
       FORM INPUTS
    ============================================ */
    .input-group {
      margin-bottom: clamp(1rem, 3vw, 1.3rem);
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.82rem 1.15rem;
      color: var(--text-base);
      font-size: clamp(0.88rem, 2.5vw, 1rem);
      font-family: inherit;
      transition:
        border-color var(--transition),
        box-shadow var(--transition);
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.18);
    }

    input[type="text"]::placeholder,
    textarea::placeholder {
      color: #475569;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
      line-height: 1.6;
    }

    /* ============================================
       PRIVACY SELECTOR
    ============================================ */
    .privacy-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
      margin: 0.6rem 0 clamp(1rem, 3vw, 1.4rem);
    }

    .privacy-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-size: clamp(0.82rem, 2vw, 0.9rem);
      color: var(--text-soft);
      font-weight: 400;
      transition: color var(--transition);
      user-select: none;
    }

    .privacy-option:hover {
      color: var(--text-base);
    }

    .privacy-option input[type="radio"] {
      width: auto;
      accent-color: var(--blue);
      cursor: pointer;
    }

    /* ============================================
       CREATE BUTTON
    ============================================ */
    .create-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      border: none;
      color: white;
      font-weight: 700;
      font-size: clamp(0.95rem, 2.5vw, 1.08rem);
      padding: clamp(0.8rem, 3vw, 0.95rem) 2rem;
      border-radius: var(--radius-pill);
      width: 100%;
      cursor: pointer;
      transition:
        transform var(--transition),
        box-shadow var(--transition),
        opacity 0.2s ease;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.32);
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    /* Shimmer layer on hover */
    .create-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        105deg,
        transparent 30%,
        rgba(255,255,255,0.12) 50%,
        transparent 70%
      );
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .create-btn:hover:not(:disabled)::after {
      transform: translateX(100%);
    }

    .create-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(124, 58, 237, 0.42);
    }

    .create-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.3);
    }

    .create-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .create-btn:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 3px;
    }

    .btn-svg-icon {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ============================================
       SPINNER
    ============================================ */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255, 255, 255, 0.28);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }

    /* ============================================
       PROGRESS BAR
    ============================================ */
    .progress-bar-wrap {
      height: 5px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      overflow: hidden;
      margin: 1rem 0 0.5rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 3px;
      width: 0%;
      transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .progress-info {
      font-size: clamp(0.78rem, 2vw, 0.88rem);
      color: #a5b4fc;
      margin-bottom: 0.5rem;
      min-height: 1.2em;
    }

    /* ============================================
       STATUS MESSAGE
    ============================================ */
    .status-message {
      margin-top: 1rem;
      padding: 0.88rem 1rem 0.88rem 1.1rem;
      border-radius: var(--radius-md);
      font-size: clamp(0.82rem, 2vw, 0.9rem);
      background: var(--surface-md);
      color: var(--text-soft);
      border-left: 4px solid transparent;
      line-height: 1.55;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      animation: fadeSlideUp 0.25s ease both;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.35em;
    }

    .status-message.error {
      background: rgba(239, 68, 68, 0.12);
      border-left-color: var(--red);
      color: #fca5a5;
    }

    .status-message.error .status-dot {
      background: var(--red);
    }

    .status-message.success {
      background: rgba(34, 197, 94, 0.12);
      border-left-color: var(--green);
      color: #86efac;
    }

    .status-message.success .status-dot {
      background: var(--green);
    }

    .playlist-link {
      color: #93c5fd;
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 500;
      transition: color 0.2s;
      white-space: nowrap;
    }

    .playlist-link:hover {
      color: #bfdbfe;
    }

    /* ============================================
       REDUCED MOTION — all animations off
    ============================================ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .progress-bar-fill {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div class="card" id="app">

    <!-- ==========================================
         LOGIN VIEW
    ========================================== -->
    <div id="loginContainer" class="login-container view">

      <h1>
        <!-- Music note SVG icon -->
        <svg class="title-icon" viewBox="0 0 24 24"
             aria-hidden="true" focusable="false">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/>
          <circle cx="18" cy="16" r="3"/>
        </svg>
        Playlist Creator
      </h1>

      <p class="subtitle">
        Turn song names or YouTube links into a playlist on your account.
      </p>

      <button id="googleSignInBtn" class="google-btn"
              aria-label="Sign in with your Google account">
        <!-- Official Google G SVG mark -->
        <svg class="google-logo" viewBox="0 0 24 24"
             aria-hidden="true" focusable="false">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26
               1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92
               3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23
               1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99
               20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43
               8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09
               14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6
               3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>

      <p class="login-hint">
        You'll be asked to allow YouTube playlist management.
      </p>

    </div><!-- /loginContainer -->

    <!-- ==========================================
         MAIN APP VIEW
    ========================================== -->
    <div id="mainContainer" class="main-container hidden">

      <!-- Profile bar -->
      <div class="profile-area" id="profileArea">
        <div class="avatar-wrap">
          <img id="userAvatar" src="" alt="Your Google profile picture"
               class="user-avatar" width="42" height="42" />
          <span class="avatar-online-dot" aria-hidden="true"></span>
        </div>
        <div class="user-info">
          <div class="user-name"  id="userName"></div>
          <div class="user-email" id="userEmail"></div>
        </div>
        <button id="logoutBtn" class="logout-btn" aria-label="Sign out of your account">
          <!-- Sign-out arrow SVG -->
          <svg class="logout-icon" viewBox="0 0 24 24"
               aria-hidden="true" focusable="false">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Sign out
        </button>
      </div>

      <!-- Playlist name -->
      <div class="input-group">
        <label for="playlistName">Playlist name</label>
        <input
          type="text"
          id="playlistName"
          placeholder="My awesome playlist"
          value="My YouTube Playlist"
          autocomplete="off"
          maxlength="150"
          spellcheck="false"
        >
      </div>

      <!-- Song list -->
      <div class="input-group">
        <label for="songList">Songs or YouTube links (one per line)</label>
        <textarea
          id="songList"
          placeholder="Bohemian Rhapsody - Queen&#10;https://www.youtube.com/watch?v=fJ9rUzIMcZQ&#10;Shape of You - Ed Sheeran"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
      </div>

      <!-- Privacy -->
      <label as="legend">Privacy</label>
      <div class="privacy-selector" role="radiogroup" aria-label="Playlist privacy setting">
        <label class="privacy-option">
          <input type="radio" name="privacy" value="private" checked> Private
        </label>
        <label class="privacy-option">
          <input type="radio" name="privacy" value="unlisted"> Unlisted
        </label>
        <label class="privacy-option">
          <input type="radio" name="privacy" value="public"> Public
        </label>
      </div>

      <!-- Create button -->
      <button id="createPlaylistBtn" class="create-btn"
              aria-label="Create YouTube playlist from the songs listed above">
        <!-- Plus icon -->
        <svg class="btn-svg-icon" viewBox="0 0 24 24"
             aria-hidden="true" focusable="false">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5"  y1="12" x2="19" y2="12"/>
        </svg>
        Create Playlist
      </button>

      <!-- Progress bar -->
      <div class="progress-bar-wrap hidden" id="progressBarWrap"
           role="presentation" aria-hidden="true">
        <div class="progress-bar-fill" id="progressBarFill"></div>
      </div>

      <!-- Progress text (screen-reader friendly) -->
      <div id="progressInfo"
           class="progress-info hidden"
           role="status"
           aria-live="polite"
           aria-atomic="true"></div>

      <!-- Status message -->
      <div id="statusArea"
           class="status-message hidden"
           role="status"
           aria-live="polite"
           aria-atomic="true">
        <span class="status-dot" id="statusDot" aria-hidden="true"></span>
        <span id="statusText"></span>
      </div>

    </div><!-- /mainContainer -->

  </div><!-- /card -->

  <script>
    /* ============================================
       CONFIG
    ============================================ */
    const CLIENT_ID = '869750639696-h4s0u5g4fj46blqd0pos9utb2hdv1rnt.apps.googleusercontent.com';
    const SCOPES    = 'https://www.googleapis.com/auth/youtube.force-ssl';

    /* ============================================
       DOM REFS
    ============================================ */
    const loginContainer    = document.getElementById('loginContainer');
    const mainContainer     = document.getElementById('mainContainer');
    const googleSignInBtn   = document.getElementById('googleSignInBtn');
    const logoutBtn         = document.getElementById('logoutBtn');
    const userAvatar        = document.getElementById('userAvatar');
    const userNameEl        = document.getElementById('userName');
    const userEmailEl       = document.getElementById('userEmail');
    const playlistNameInput = document.getElementById('playlistName');
    const songListInput     = document.getElementById('songList');
    const createBtn         = document.getElementById('createPlaylistBtn');
    const statusArea        = document.getElementById('statusArea');
    const statusDot         = document.getElementById('statusDot');
    const statusText        = document.getElementById('statusText');
    const progressInfo      = document.getElementById('progressInfo');
    const progressBarWrap   = document.getElementById('progressBarWrap');
    const progressBarFill   = document.getElementById('progressBarFill');

    /* ============================================
       STATE
    ============================================ */
    let accessToken  = null;
    let tokenExpiry  = null;
    let tokenClient  = null;

    /* ============================================
       GOOGLE AUTH INIT
    ============================================ */
    function initGoogleAuth() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope:     SCOPES,
        callback:  handleTokenResponse,
        ux_mode:   'popup',
      });

      // Restore session if token still valid
      const storedToken  = sessionStorage.getItem('gapi_access_token');
      const storedExpiry = sessionStorage.getItem('gapi_token_expiry');

      if (
        isValidTokenString(storedToken) &&
        storedExpiry &&
        !isNaN(parseInt(storedExpiry, 10)) &&
        Date.now() < parseInt(storedExpiry, 10)
      ) {
        accessToken = storedToken;
        tokenExpiry = parseInt(storedExpiry, 10);
        showMainApp();
        fetchUserProfile();
      } else {
        sessionStorage.removeItem('gapi_access_token');
        sessionStorage.removeItem('gapi_token_expiry');
      }

      googleSignInBtn.addEventListener('click', () => {
        if (!tokenClient) {
          showStatus('Google sign-in not yet ready. Please wait a moment.', 'error');
          return;
        }
        tokenClient.requestAccessToken();
      });

      logoutBtn.addEventListener('click', signOut);
      createBtn.addEventListener('click', handleCreatePlaylist);
    }

    /* ============================================
       TOKEN HELPERS
    ============================================ */
    function isValidTokenString(token) {
      return (
        typeof token === 'string' &&
        token.length > 20 &&
        /^[A-Za-z0-9._\-/]+$/.test(token)
      );
    }

    function handleTokenResponse(response) {
      if (response.error !== undefined) {
        showStatus('Login failed: ' + (response.error_description || response.error), 'error');
        return;
      }
      accessToken = response.access_token;
      const expiresIn = response.expires_in || 3600;
      tokenExpiry = Date.now() + expiresIn * 1000;
      sessionStorage.setItem('gapi_access_token', accessToken);
      sessionStorage.setItem('gapi_token_expiry', tokenExpiry.toString());
      showMainApp();
      fetchUserProfile();
    }

    async function getValidToken() {
      if (accessToken && Date.now() < tokenExpiry) {
        return accessToken;
      }

      return new Promise((resolve, reject) => {
        if (!tokenClient) {
          return reject(new Error('Auth client not initialized'));
        }

        const originalCallback = tokenClient.callback;

        tokenClient.callback = (response) => {
          // Always restore original callback before resolving/rejecting
          tokenClient.callback = originalCallback;

          if (response.error) {
            return reject(
              new Error(response.error_description || 'Re-authentication failed')
            );
          }

          accessToken  = response.access_token;
          tokenExpiry  = Date.now() + ((response.expires_in || 3600) * 1000);
          sessionStorage.setItem('gapi_access_token', accessToken);
          sessionStorage.setItem('gapi_token_expiry', tokenExpiry.toString());
          resolve(accessToken);
        };

        // prompt:'' = silent refresh attempt first
        tokenClient.requestAccessToken({ prompt: '' });
      });
    }

    /* ============================================
       USER PROFILE
    ============================================ */
    async function fetchUserProfile() {
      try {
        const resp = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: `Bearer ${accessToken}` }
        });
        if (!resp.ok) throw new Error('Failed to fetch user info');

        const data = await resp.json();
        userNameEl.textContent  = data.name  || 'YouTube User';
        userEmailEl.textContent = data.email || '';

        if (data.picture) {
          userAvatar.src = data.picture;
          userAvatar.onerror = () => {
            userAvatar.src = getAvatarFallback();
            userAvatar.onerror = null;
          };
        } else {
          userAvatar.src = getAvatarFallback();
        }
      } catch (err) {
        console.warn('Could not load user profile:', err);
        userNameEl.textContent = 'YouTube User';
        userAvatar.src = getAvatarFallback();
      }
    }

    function getAvatarFallback() {
      // Inline SVG data URI — no network request, always works
      return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'
        viewBox='0 0 44 44'%3E%3Ccircle cx='22' cy='22' r='22'
        fill='%23334155'/%3E%3Ccircle cx='22' cy='17' r='8'
        fill='%2394a3b8'/%3E%3Cellipse cx='22' cy='38' rx='14'
        ry='9' fill='%2394a3b8'/%3E%3C/svg%3E`;
    }

    /* ============================================
       VIEW MANAGEMENT
    ============================================ */
    function showMainApp() {
      loginContainer.classList.add('hidden');
      mainContainer.classList.remove('hidden');
      mainContainer.classList.add('view');
      clearStatus();
    }

    function showLoginScreen() {
      mainContainer.classList.add('hidden');
      mainContainer.classList.remove('view');
      loginContainer.classList.remove('hidden');
      clearStatus();
    }

    function signOut() {
      if (accessToken) {
        google.accounts.oauth2.revoke(accessToken, () => {});
      }
      accessToken = null;
      tokenExpiry = null;
      sessionStorage.removeItem('gapi_access_token');
      sessionStorage.removeItem('gapi_token_expiry');
      showLoginScreen();
    }

    /* ============================================
       STATUS & PROGRESS UI
    ============================================ */
    function showStatus(message, type = 'info', linkData = null) {
      statusArea.classList.remove('hidden', 'error', 'success');
      statusArea.classList.add(type);

      // Set text safely via DOM — no innerHTML on user-influenced strings
      statusText.innerHTML = '';
      statusText.appendChild(document.createTextNode(message));

      if (linkData) {
        const space = document.createTextNode(' ');
        const a = document.createElement('a');
        a.href      = linkData.href;
        a.textContent = linkData.label;
        a.className = 'playlist-link';
        a.target    = '_blank';
        a.rel       = 'noopener noreferrer';
        statusText.appendChild(space);
        statusText.appendChild(a);
      }
    }

    function clearStatus() {
      statusArea.classList.add('hidden');
      statusArea.classList.remove('error', 'success');
      statusText.textContent = '';
      hideProgress();
    }

    function setProgress(text, percent = null) {
      progressInfo.textContent = text;
      progressInfo.classList.remove('hidden');

      if (percent !== null) {
        progressBarWrap.classList.remove('hidden');
        progressBarFill.style.width = `${percent}%`;
      }
    }

    function hideProgress() {
      progressInfo.classList.add('hidden');
      progressBarWrap.classList.add('hidden');
      progressBarFill.style.width = '0%';
      progressInfo.textContent = '';
    }

    /* ============================================
       BUTTON LOADING STATE
    ============================================ */
    function setButtonLoading(isLoading) {
      createBtn.disabled = isLoading;

      if (isLoading) {
        createBtn.innerHTML = `
          <span class="spinner" aria-hidden="true"></span>
          Working...
        `;
      } else {
        createBtn.innerHTML = `
          <svg class="btn-svg-icon" viewBox="0 0 24 24"
               aria-hidden="true" focusable="false"
               stroke="currentColor" fill="none"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5"  y1="12" x2="19" y2="12"/>
          </svg>
          Create Playlist
        `;
      }
    }

    /* ============================================
       YOUTUBE API HELPERS
    ============================================ */
    async function apiCall(url, options = {}) {
      const token = await getValidToken();
      const headers = {
        'Authorization':  `Bearer ${token}`,
        'Content-Type':   'application/json',
        ...options.headers,
      };
      const response = await fetch(url, { ...options, headers });

      if (!response.ok) {
        const errorBody = await response.json().catch(() => ({}));
        const message   = errorBody.error?.message || `YouTube API error (${response.status})`;
        throw new Error(message);
      }
      return response.json();
    }

    function extractYouTubeId(raw) {
      const trimmed = raw.trim();
      const regex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/|v\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
      const match  = trimmed.match(regex);
      return match ? match[1] : null;
    }

    async function searchSong(query) {
      const url  = `https://youtube.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(query)}&type=video`;
      const data = await apiCall(url);
      return data.items?.length > 0 ? data.items[0].id.videoId : null;
    }

    async function createPlaylist(title, privacyStatus = 'private') {
      const data = await apiCall(
        'https://youtube.googleapis.com/youtube/v3/playlists?part=snippet,status',
        {
          method: 'POST',
          body: JSON.stringify({
            snippet: { title },
            status:  { privacyStatus },
          }),
        }
      );
      return data.id;
    }

    async function addToPlaylist(playlistId, videoId) {
      await apiCall(
        'https://youtube.googleapis.com/youtube/v3/playlistItems?part=snippet',
        {
          method: 'POST',
          body: JSON.stringify({
            snippet: {
              playlistId,
              resourceId: { kind: 'youtube#video', videoId },
            },
          }),
        }
      );
    }

    /* ============================================
       MAIN HANDLER
    ============================================ */
    async function handleCreatePlaylist() {
      // Guard: valid session
      if (!accessToken || Date.now() >= tokenExpiry) {
        showStatus('Session expired. Please sign in again.', 'error');
        signOut();
        return;
      }

      // Guard: playlist name
      const playlistName = playlistNameInput.value.trim();
      if (!playlistName) {
        showStatus('Please enter a playlist name.', 'error');
        return;
      }

      // Guard: song list
      const rawSongs = songListInput.value.trim();
      if (!rawSongs) {
        showStatus('Add at least one song name or YouTube link.', 'error');
        return;
      }

      const songs = rawSongs
        .split('\n')
        .map(s => s.trim())
        .filter(s => s.length > 0);

      if (songs.length === 0) {
        showStatus('No valid entries found.', 'error');
        return;
      }

      const privacyRadio  = document.querySelector('input[name="privacy"]:checked');
      const privacyStatus = privacyRadio ? privacyRadio.value : 'private';

      setButtonLoading(true);
      clearStatus();
      setProgress('Preparing your playlist...', 0);

      try {
        setProgress('Creating playlist on YouTube...', 5);
        const playlistId = await createPlaylist(playlistName, privacyStatus);

        const total   = songs.length;
        let   added   = 0;
        const skipped = [];

        for (let i = 0; i < total; i++) {
          const entry   = songs[i];
          const label   = entry.length > 42
            ? entry.substring(0, 42) + '…'
            : entry;
          const percent = Math.round(((i + 1) / total) * 95) + 5;

          setProgress(`Adding ${i + 1} of ${total}: "${label}"`, percent);

          // Resolve video ID
          let videoId = extractYouTubeId(entry);

          if (!videoId) {
            try {
              videoId = await searchSong(entry);
            } catch (searchErr) {
              console.warn('Search error:', entry, searchErr);
              skipped.push({ entry, reason: 'Search failed' });
              continue;
            }
          }

          if (!videoId) {
            skipped.push({ entry, reason: 'No video found' });
            continue;
          }

          try {
            await addToPlaylist(playlistId, videoId);
            added++;
          } catch (insertErr) {
            console.warn('Insert error:', entry, insertErr);
            if (insertErr.message.includes('quota')) {
              showStatus(
                'YouTube quota exceeded. Playlist was created but some songs could not be added.',
                'error'
              );
              break;
            }
            skipped.push({ entry, reason: insertErr.message || 'Add failed' });
          }

          // Small delay between inserts to be kind to the API
          if (i < total - 1) {
            await new Promise(r => setTimeout(r, 200));
          }
        }

        // Final progress fill
        setProgress('Done!', 100);
        await new Promise(r => setTimeout(r, 500));
        hideProgress();

        const summaryMsg = `Playlist created — ${added} song${added !== 1 ? 's' : ''} added${skipped.length > 0 ? `, ${skipped.length} skipped` : ''}.`;

        showStatus(
          summaryMsg,
          'success',
          {
            href:  `https://www.youtube.com/playlist?list=${playlistId}`,
            label: 'Open playlist →',
          }
        );

      } catch (error) {
        console.error('Playlist creation error:', error);
        hideProgress();

        let msg = error.message || 'Something went wrong.';
        if (msg.includes('quota')) {
          msg = 'YouTube API quota exceeded. Please try again later.';
        }

        showStatus(msg, 'error');
      } finally {
        setButtonLoading(false);
      }
    }
  </script>
